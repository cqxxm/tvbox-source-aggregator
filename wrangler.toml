name = "cqtvbox"
main = "src/cf-entry.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]

# 自定义域名（可选，推荐配置）
# 取消注释并替换为你自己的域名和 Zone ID
# routes = [
#   { pattern = "tvbox.yourdomain.com/*", zone_id = "your-zone-id" }
# ]

[triggers]
crons = ["0 * * * *"]  # 每小时触发，实际执行频率由 Admin 设置的聚合间隔控制

[[kv_namespaces]]
binding = "CONFIG_KV"
id = "6e1ad3eca0e61db2fb1381efb75b99ac"
preview_id = "01be699a3f2e4e85a7b907ad1ce87c95"

[vars]
SPEED_TIMEOUT_MS = "5000"   # 源地址延迟阈值（毫秒）
SITE_TIMEOUT_MS = "3000"    # 站点 ：API 延迟阈值（毫秒）
FETCH_TIMEOUT_MS = "5000"   # 抓取配置 JSON 超时（毫秒）
WORKER_BASE_URL = "cqtvbox.cqxxm.workers.dev"  # CF 边缘代理依赖此配置（JAR/MacCMS/直播源代理）
